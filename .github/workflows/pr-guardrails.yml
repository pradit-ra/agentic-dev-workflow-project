name: OC PR Guardrails

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, labeled]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  classify:
    runs-on: ubuntu-latest
    outputs:
      kind: ${{ steps.classify.outputs.kind }}
      issue_number: ${{ steps.extract_issue.outputs.issue_number }}
    steps:
      - name: Classify PR
        id: classify
        uses: actions/github-script@v7.1.0
        with:
          script: |
            const labels = context.payload.pull_request.labels.map((label) => label.name);
            let kind = 'unknown';

            if (labels.includes('oc-plan')) {
              kind = 'plan';
            } else if (labels.includes('oc-code')) {
              kind = 'code';
            }

            core.setOutput('kind', kind);

      - name: Extract issue number from PR body
        id: extract_issue
        uses: actions/github-script@v7.1.0
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const match = body.match(/(?:Issue|Closes):\s*#?(\d+)/i);
            core.setOutput('issue_number', match ? match[1] : '');

  plan_checks:
    needs: classify
    if: needs.classify.outputs.kind == 'plan'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plan PR
        uses: actions/checkout@v4.3.1
        with:
          fetch-depth: 0

      - name: Enforce docs-only changes
        shell: bash
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          if git diff --name-only "origin/${{ github.base_ref }}"...HEAD | grep -vE '^(docs/|\.github/|README\.md$)' ; then
            echo "Plan PR must be docs-only."
            exit 1
          fi

      - name: Require execution plan file
        shell: bash
        run: |
          test -f "docs/execution-plan-issue-${{ needs.classify.outputs.issue_number }}.md"

      - name: Verify plan stage is in_review
        uses: actions/github-script@v7.1.0
        with:
          script: |
            const fs = require('fs');
            const planFile = 'docs/execution-plan-issue-' + '${{ needs.classify.outputs.issue_number }}' + '.md';
            if (!fs.existsSync(planFile)) {
              core.setFailed('Plan file not found: ' + planFile);
              return;
            }
            const content = fs.readFileSync(planFile, 'utf8');
            if (!content.includes('stage: in_review')) {
              core.setFailed('Plan stage must be in_review before merging.');
            }

  code_checks:
    needs: classify
    if: needs.classify.outputs.kind == 'code'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code PR
        uses: actions/checkout@v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          if [ -f pyproject.toml ]; then
            python -m pip install --upgrade pip
            python -m pip install -e .
            python -m pip install pytest
          elif [ -f requirements.txt ]; then
            python -m pip install --upgrade pip
            python -m pip install -r requirements.txt
            python -m pip install pytest
          fi

      - name: Run project tests
        shell: bash
        run: |
          set -euo pipefail

          if [ -f package.json ]; then
            npm test
          elif [ -f pnpm-lock.yaml ]; then
            corepack pnpm test
          elif [ -f yarn.lock ]; then
            corepack yarn test
          elif [ -f go.mod ]; then
            go test ./...
          elif [ -f pyproject.toml ] || [ -f requirements.txt ]; then
            pytest
          elif [ -f pom.xml ]; then
            mvn test
          elif [ -f build.gradle ] || [ -f build.gradle.kts ]; then
            ./gradlew test
          else
            echo "No recognized test command for this repository."
            exit 1
          fi

  plan_done_transition:
    needs: [classify]
    if: github.event.pull_request.merged == true && needs.classify.outputs.kind == 'code'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.3.1
        with:
          fetch-depth: 1

      - name: Extract plan file path
        id: extract
        uses: actions/github-script@v7.1.0
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const match = body.match(/(?:Plan|References):\s*#?(\d+)/i);
            const issueNumber = match ? match[1] : '';
            const planFile = 'docs/execution-plan-issue-' + issueNumber + '.md';
            core.setOutput('plan_file', planFile);
            core.setOutput('issue_number', issueNumber);

      - name: Update plan stage to done
        if: needs.extract.outputs.issue_number != ''
        shell: bash
        env:
          PLAN_FILE: ${{ needs.extract.outputs.plan_file }}
          ISSUE_NUM: ${{ needs.extract.outputs.issue_number }}
        run: |
          if [ -f "$PLAN_FILE" ]; then
            if grep -q 'stage: in_review' "$PLAN_FILE"; then
              sed -i 's/stage: in_review/stage: done/' "$PLAN_FILE"
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add "$PLAN_FILE"
              git commit -m "[skip ci] chore: mark plan as done after code merge (refs #${ISSUE_NUM})"
              git push origin main
              echo "Plan updated to done stage."
            else
              echo "Plan stage is not in_review, skipping."
            fi
          else
            echo "Plan file not found: $PLAN_FILE"
            exit 1
          fi