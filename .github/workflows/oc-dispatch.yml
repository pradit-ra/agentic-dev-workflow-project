name: OpenAgentControl Dispatch

on:
  workflow_call:
    inputs:
      mode:
        description: "plan or kickoff"
        required: true
        type: string
      correlation_key:
        description: "Idempotency and concurrency key"
        required: true
        type: string
      repo:
        description: "owner/repo"
        required: true
        type: string
      issue_number:
        required: false
        type: string
        default: ""
      issue_url:
        required: false
        type: string
        default: ""
      issue_title:
        required: false
        type: string
        default: ""
      issue_body:
        required: false
        type: string
        default: ""
      issue_comments:
        required: false
        type: string
        default: ""
      commenter:
        required: false
        type: string
        default: ""
      comment_body:
        required: false
        type: string
        default: ""
      pr_number:
        required: false
        type: string
        default: ""
      pr_url:
        required: false
        type: string
        default: ""
      pr_title:
        required: false
        type: string
        default: ""
      pr_body:
        required: false
        type: string
        default: ""
      plan_file:
        required: false
        type: string
        default: ""

# permissions:
#   contents: write
#   issues: write
#   pull-requests: write
#   actions: read

concurrency:
  group: oc-${{ inputs.correlation_key }}
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest #[self-hosted, linux, x64, oc-runner]
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
        
      - name: Get opencode version
        id: version
        shell: bash
        run: |
          VERSION=$(curl -sf https://api.github.com/repos/anomalyco/opencode/releases/latest | grep -o '"tag_name": *"[^"]*"' | cut -d'"' -f4)
          echo "version=${VERSION:-latest}" >> $GITHUB_OUTPUT

      - name: Cache opencode
        id: cache
        uses: actions/cache@v4
        with:
          path: ~/.opencode/bin
          key: opencode-${{ runner.os }}-${{ runner.arch }}-${{ steps.version.outputs.version }}

      - name: Install opencode
        if: steps.cache.outputs.cache-hit != 'true'
        shell: bash
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Add opencode to PATH
        shell: bash
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Compose OpenCode prompt
        id: prompt
        env:
          MODE: ${{ inputs.mode }}
          REPOSITORY: ${{ inputs.repo }}
          CORRELATION_KEY: ${{ inputs.correlation_key }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          ISSUE_URL: ${{ inputs.issue_url }}
          ISSUE_TITLE: ${{ inputs.issue_title }}
          ISSUE_BODY: ${{ inputs.issue_body }}
          ISSUE_COMMENTS: ${{ inputs.issue_comments }}
          COMMENTER: ${{ inputs.commenter }}
          COMMENT_BODY: ${{ inputs.comment_body }}
          PR_NUMBER: ${{ inputs.pr_number }}
          PR_URL: ${{ inputs.pr_url }}
          PR_TITLE: ${{ inputs.pr_title }}
          PR_BODY: ${{ inputs.pr_body }}
          PLAN_FILE: ${{ inputs.plan_file }}
        shell: bash
        run: |
          set -euo pipefail
          prompt_file="$RUNNER_TEMP/opencode-prompt.md"
          cat <<-'EOF' > "$prompt_file"
          You are running inside GitHub Actions for OpenAgentsControl.

          The repository already contains project-specific OAC context in `.opencode/`.
          Use the checked-out workspace directly and keep the work visible in Git history and pull requests.
          Follow the plan-first workflow and stop if required information is still missing.
          EOF

          if [ "$MODE" = "plan" ]; then
          cat <<-'EOF' >> "$prompt_file"
          Task mode: plan

          Goal:
          - Summarize the issue discussion and linked subissues into an execution plan.
          - Write the plan into `docs/execution-plan-issue-${ISSUE_NUMBER}.md`.
          - Keep this PR docs-only.
          - Create or update a branch for the plan PR.
          - Open a pull request labeled `oc-plan`.

          Output expectations:
          - Include problem statement, goals, non-goals, risks, implementation steps, validation steps, and rollback notes.
          - Reference the issue number in the PR body.
          - Set plan stage: "in_review"
          EOF
          else
          cat <<-'EOF' >> "$prompt_file"
          Task mode: kickoff

          Goal:
          - Read the merged execution plan related to the issue number and implement the code changes it describes.
          - Keep the implementation aligned with the approved plan.
          - Run the appropriate project tests and validation commands.
          - Create or update a branch for the code change PR.
          - Open a pull request labeled `oc-code`.

          Output expectations:
          - Keep the code PR focused on implementation only.
          - Reference the merged plan PR and the source issue in the PR body.
          - After code PR merges to main: Update the plan file (docs/execution-plan-issue-${ISSUE_NUMBER}.md) to set stage: "done" using a commit to main.
          EOF
          fi

          {
            printf 'Plan file: %s\n' "$PLAN_FILE"
            printf '\nRepository: %s\n' "$REPOSITORY"
            printf 'Correlation key: %s\n' "$CORRELATION_KEY"
            printf 'Issue number: %s\n' "$ISSUE_NUMBER"
            printf 'Issue URL: %s\n' "$ISSUE_URL"
            printf 'Issue title: %s\n' "$ISSUE_TITLE"
            printf 'Commenter: %s\n' "$COMMENTER"
            printf 'Comment body:\n%s\n' "$COMMENT_BODY"
            printf 'Issue discussion thread:\n%s\n' "$ISSUE_COMMENTS"
            printf 'Plan PR number: %s\n' "$PR_NUMBER"
            printf 'Plan PR URL: %s\n' "$PR_URL"
            printf 'Plan PR title: %s\n' "$PR_TITLE"
            printf 'Plan PR body:\n%s\n' "$PR_BODY"
          } >> "$prompt_file"

          echo "prompt_file=$prompt_file"


      - name: Run OpenCode agent
        shell: bash
        env:
          MODE: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          agent="OpenAgent"
          if [ "$MODE" = "kickoff" ]; then
            agent="OpenCoder"
          fi

          prompt="$(cat "${{ steps.prompt.outputs.prompt_file }}")"
          opencode --agent "$agent" -c "$GITHUB_WORKSPACE" -p "$prompt" -f json -q \
            | tee "$RUNNER_TEMP/opencode-output.json"
